version: '3.8'

services:
  database:
    image: postgres:16-alpine
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: default_database
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - 3000:3000
    env_file: env/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/default_database
    depends_on:
      database:
        condition: service_healthy

volumes:
  pgdata:
