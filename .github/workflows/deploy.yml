name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/deefy1v9/mids

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build e Push da imagem Docker
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:latest -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy com Docker Swarm
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          KOMMO_SUBDOMAIN: ${{ secrets.KOMMO_SUBDOMAIN }}
          KOMMO_ACCESS_TOKEN: ${{ secrets.KOMMO_ACCESS_TOKEN }}
          TENFRONT_BASE_URL: ${{ secrets.TENFRONT_BASE_URL }}
          TENFRONT_BEARER_TOKEN: ${{ secrets.TENFRONT_BEARER_TOKEN }}
          TENFRONT_CONSUMER_KEY: ${{ secrets.TENFRONT_CONSUMER_KEY }}
          TENFRONT_CONSUMER_SECRET: ${{ secrets.TENFRONT_CONSUMER_SECRET }}
          CRON_SCHEDULE: ${{ secrets.CRON_SCHEDULE }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: |
          docker stack deploy \
            --with-registry-auth \
            --compose-file ${{ github.workspace }}/docker-compose.app.yml \
            mids
          echo "✅ Deploy concluído!"
          docker service ls --filter name=mids
