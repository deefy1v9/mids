name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/deefy1v9/mids

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Copiar docker-compose.app.yml para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.app.yml
          target: /opt/mids/

      - name: Deploy no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export KOMMO_SUBDOMAIN="${{ secrets.KOMMO_SUBDOMAIN }}"
            export KOMMO_ACCESS_TOKEN="${{ secrets.KOMMO_ACCESS_TOKEN }}"
            export TENFRONT_BASE_URL="${{ secrets.TENFRONT_BASE_URL }}"
            export TENFRONT_BEARER_TOKEN="${{ secrets.TENFRONT_BEARER_TOKEN }}"
            export TENFRONT_CONSUMER_KEY="${{ secrets.TENFRONT_CONSUMER_KEY }}"
            export TENFRONT_CONSUMER_SECRET="${{ secrets.TENFRONT_CONSUMER_SECRET }}"
            export CRON_SCHEDULE="${{ secrets.CRON_SCHEDULE }}"
            export APP_SECRET="${{ secrets.APP_SECRET }}"
            export META_ACCESS_TOKEN="${{ secrets.META_ACCESS_TOKEN }}"
            export META_AD_ACCOUNT_ID="${{ secrets.META_AD_ACCOUNT_ID }}"
            docker stack deploy \
              --with-registry-auth \
              --compose-file /opt/mids/docker-compose.app.yml \
              mids
            echo "✅ Deploy concluído!"
            docker service ls --filter name=mids
